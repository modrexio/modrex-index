name: Update mod index

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Full rebuild (ignore existing index, re-index all mods)'
        type: boolean
        default: false
      backfill:
        description: 'Backfill (scan all mods but skip already-indexed files — use after adding a new format or a new game)'
        type: boolean
        default: false
      concurrency:
        description: 'Storage download parallelism (default 5, backfill 10; API calls are throttled separately so higher is safe)'
        type: string
        default: ''

permissions:
  contents: write

# One run at a time: the indexer shares a 90 req/min API budget per IP. Overlapping
# runs (e.g. the 5-minute cron firing during a long backfill) would split that budget
# and trigger 429s. New runs queue instead of cancelling the in-progress one.
concurrency:
  group: update-index
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install system dependencies
        run: sudo apt-get install -y p7zip-full

      - name: Install dependencies
        run: pnpm install

      - name: Download existing index
        if: ${{ !inputs.full_rebuild }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download latest-index --pattern index.db --output index.db 2>/dev/null || true

      - name: Run indexer
        id: indexer
        run: |
          set +e
          args=""
          ${{ inputs.backfill == true }} && args="$args --backfill"
          [ -n "${{ inputs.concurrency }}" ] && args="$args --concurrency=${{ inputs.concurrency }}"
          pnpm build-index $args
          code=$?
          set -e
          if [ $code -eq 1 ]; then exit 1; fi
          echo "changed=$([ $code -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Upload updated index
        if: steps.indexer.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest-index index.db --clobber 2>/dev/null || \
            gh release create latest-index index.db \
              --title "Latest mod index" \
              --notes "Auto-updated PD2 + PD3 mod hash index for modrex."
