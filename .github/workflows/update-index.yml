name: Update mod index

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Full rebuild (ignore existing index, re-index all mods)'
        type: boolean
        default: false
      backfill:
        description: 'Backfill (scan all mods but skip already-indexed files — use after adding a new format or a new game)'
        type: boolean
        default: false
      repair_versions:
        description: 'Repair versions only (rewrite the version column from the listings — no downloads, ~minutes)'
        type: boolean
        default: false
      recheck_all:
        description: 'Ignore per-mod check state (re-examine every mod — use if a mod was wrongly skipped, e.g. after a coverage change)'
        type: boolean
        default: false
      concurrency:
        description: 'Storage download parallelism (default 5, backfill 10; API calls are throttled separately so higher is safe)'
        type: string
        default: ''

permissions:
  contents: write

# One run at a time: the indexer shares a 90 req/min API budget per IP. Overlapping
# runs (e.g. the 5-minute cron firing during a long backfill) would split that budget
# and trigger 429s. New runs queue instead of cancelling the in-progress one.
concurrency:
  group: update-index
  cancel-in-progress: false

jobs:
  update:
    if: ${{ !inputs.full_rebuild }}
    runs-on: ubuntu-latest
    # Incremental/backfill runs fit comfortably below this. Full rebuilds use the
    # checkpointed jobs below because a single hosted job cannot exceed six hours.
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install system dependencies
        run: sudo apt-get install -y p7zip-full

      - name: Install dependencies
        run: pnpm install

      - name: Download existing index
        if: ${{ !inputs.full_rebuild }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry + integrity-check the download. GitHub's release CDN can briefly serve a
          # stale/partial copy after an asset is replaced; proceeding on a corrupt index.db
          # would either crash or (worse) write the damage back. Fail safely instead.
          ok=0
          for i in 1 2 3 4 5; do
            rm -f index.db index.db-wal index.db-shm
            # Fetch via the API asset endpoint (api.github.com), not the release-download
            # CDN — that CDN keys on the path and can serve a stale/corrupt copy long after
            # the asset is replaced.
            aid=$(gh api "repos/${{ github.repository }}/releases/tags/latest-index" --jq '.assets[] | select(.name=="index.db") | .id' 2>/dev/null)
            if [ -n "$aid" ]; then
              gh api -H "Accept: application/octet-stream" "repos/${{ github.repository }}/releases/assets/$aid" > index.db 2>/dev/null || true
            fi
            if [ -f index.db ] && node -e "const d=new(require('better-sqlite3'))('index.db',{readonly:true});const ok=d.pragma('integrity_check',{simple:true})==='ok';d.close();process.exit(ok?0:1)" 2>/dev/null; then
              ok=1; break
            fi
            echo "download attempt $i: index.db missing/corrupt — retrying in 15s"
            sleep 15
          done
          if [ "$ok" != 1 ]; then
            echo "Could not fetch a valid index.db after retries; failing without touching the release."
            exit 1
          fi

      - name: Download builder state and previous stats
        if: ${{ !inputs.full_rebuild }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Best-effort, unlike index.db: builder-state.db only *accelerates* the build
          # (per-mod check state), and index-stats.json only carries the incremental
          # window (lastRunAt) across no-op runs. Missing or corrupt copies degrade to a
          # full recheck / the DB's own last_run_at, never to wrong index content — so
          # don't retry and never fail the job over either.
          rm -f builder-state.db builder-state.db-wal builder-state.db-shm index-stats.json
          aid=$(gh api "repos/${{ github.repository }}/releases/tags/latest-index" --jq '.assets[] | select(.name=="builder-state.db") | .id' 2>/dev/null)
          if [ -n "$aid" ]; then
            gh api -H "Accept: application/octet-stream" "repos/${{ github.repository }}/releases/assets/$aid" > builder-state.db 2>/dev/null || true
          fi
          if [ -f builder-state.db ] && ! node -e "const d=new(require('better-sqlite3'))('builder-state.db',{readonly:true});const ok=d.pragma('integrity_check',{simple:true})==='ok';d.close();process.exit(ok?0:1)" 2>/dev/null; then
            echo "builder-state.db corrupt — starting with fresh state"
            rm -f builder-state.db
          fi
          sid=$(gh api "repos/${{ github.repository }}/releases/tags/latest-index" --jq '.assets[] | select(.name=="index-stats.json") | .id' 2>/dev/null)
          if [ -n "$sid" ]; then
            gh api -H "Accept: application/octet-stream" "repos/${{ github.repository }}/releases/assets/$sid" > index-stats.json 2>/dev/null || true
          fi

      - name: Run indexer
        id: indexer
        run: |
          set +e
          args=""
          ${{ inputs.backfill == true }} && args="$args --backfill"
          ${{ inputs.repair_versions == true }} && args="$args --repair-versions"
          ${{ inputs.recheck_all == true }} && args="$args --recheck-all"
          [ -n "${{ inputs.concurrency }}" ] && args="$args --concurrency=${{ inputs.concurrency }}"
          pnpm build-index $args
          code=$?
          set -e
          if [ $code -eq 1 ]; then exit 1; fi
          echo "changed=$([ $code -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Upload updated index
        if: steps.indexer.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-release-asset.sh latest-index index.db

      - name: Upload index stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -f index-stats.json
          bash .github/scripts/publish-release-asset.sh latest-index index-stats.json

      - name: Upload builder state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Uploaded on exit 0 and 2 alike — check state advances even when no new files
          # were indexed (that's the entire point of a no-op run finishing fast next time).
          if [ -f builder-state.db ]; then
            bash .github/scripts/publish-release-asset.sh latest-index builder-state.db
          fi

  rebuild-pd3:
    if: ${{ inputs.full_rebuild }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rebuild-stage
        with:
          game: pd3
          output-artifact: rebuild-pd3
          concurrency: ${{ inputs.concurrency }}

  # PD2 is API-throttle-bound and takes roughly five hours from an empty DB. Three
  # time-bounded jobs persist progress well before the hosted-runner limit; the
  # fourth finishes whatever remains.
  rebuild-pd2-1:
    if: ${{ inputs.full_rebuild }}
    needs: rebuild-pd3
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rebuild-stage
        with:
          game: pd2
          input-artifact: rebuild-pd3
          output-artifact: rebuild-pd2-1
          max-runtime-minutes: 100
          concurrency: ${{ inputs.concurrency }}

  rebuild-pd2-2:
    if: ${{ inputs.full_rebuild }}
    needs: rebuild-pd2-1
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rebuild-stage
        with:
          game: pd2
          input-artifact: rebuild-pd2-1
          output-artifact: rebuild-pd2-2
          max-runtime-minutes: 100
          concurrency: ${{ inputs.concurrency }}

  rebuild-pd2-3:
    if: ${{ inputs.full_rebuild }}
    needs: rebuild-pd2-2
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rebuild-stage
        with:
          game: pd2
          input-artifact: rebuild-pd2-2
          output-artifact: rebuild-pd2-3
          max-runtime-minutes: 100
          concurrency: ${{ inputs.concurrency }}

  rebuild-pd2-final:
    if: ${{ inputs.full_rebuild }}
    needs: rebuild-pd2-3
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - id: stage
        uses: ./.github/actions/rebuild-stage
        with:
          game: pd2
          input-artifact: rebuild-pd2-3
          output-artifact: rebuild-pd2-final
          concurrency: ${{ inputs.concurrency }}
      - name: Require complete PD2 stage
        if: ${{ steps.stage.outputs.complete != 'true' }}
        run: exit 1

  rebuild-pdth:
    if: ${{ inputs.full_rebuild }}
    needs: rebuild-pd2-final
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rebuild-stage
        with:
          game: pdth
          input-artifact: rebuild-pd2-final
          output-artifact: rebuild-pdth
          concurrency: ${{ inputs.concurrency }}

  rebuild-crime-boss:
    if: ${{ inputs.full_rebuild }}
    needs: rebuild-pdth
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rebuild-stage
        with:
          game: cb
          input-artifact: rebuild-pdth
          output-artifact: rebuild-crime-boss
          concurrency: ${{ inputs.concurrency }}

  rebuild-raid:
    if: ${{ inputs.full_rebuild }}
    needs: rebuild-crime-boss
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rebuild-stage
        with:
          game: raid
          input-artifact: rebuild-crime-boss
          output-artifact: rebuild-final
          finalize: true
          concurrency: ${{ inputs.concurrency }}

      # Production remains untouched until every game is complete and both SQLite
      # databases have passed integrity checks in the composite action.
      - name: Publish rebuilt index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-release-asset.sh latest-index index.db

      - name: Publish rebuilt stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-release-asset.sh latest-index index-stats.json

      - name: Publish rebuilt state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-release-asset.sh latest-index builder-state.db
