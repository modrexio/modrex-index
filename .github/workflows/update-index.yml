name: Update mod index

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Download existing index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download latest-index --pattern index.db --output index.db 2>/dev/null || true

      - name: Run indexer
        run: npm run build-index

      - name: Upload updated index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest-index index.db --clobber 2>/dev/null || \
            gh release create latest-index index.db \
              --title "Latest mod index" \
              --notes "Auto-updated PD3 mod hash index for pd3-mod-manager."
