name: Update mod index

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm config set minimum-release-age 0
          pnpm install

      - name: Download existing index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download latest-index --pattern index.db --output index.db 2>/dev/null || true

      - name: Run indexer
        id: indexer
        run: |
          set +e
          pnpm run build-index
          code=$?
          set -e
          if [ $code -eq 1 ]; then exit 1; fi
          echo "changed=$([ $code -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Upload updated index
        if: steps.indexer.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest-index index.db --clobber 2>/dev/null || \
            gh release create latest-index index.db \
              --title "Latest mod index" \
              --notes "Auto-updated PD3 mod hash index for pd3-mod-manager."
